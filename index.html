<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mi Supermercado</title>

<style>
html, body { margin:0; padding:0; width:100%; }
body{
  font-family: Arial, sans-serif;
  background:#fff;
  color:#222;
  padding-bottom:80px;
}

/* ===== HEADER ===== */
header{
  position:sticky; top:0; z-index:9999;
  background:#fff; width:100%;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}

/* ===== FRANJA ROJA (logo fijo) ===== */
.top-logo-bar{
  width:100%;
  height:48px;
  background:#c40000;
  display:flex; align-items:center; justify-content:center;
  box-sizing:border-box;
  position:relative;
}
.top-logo-bar img{
  max-height:30px;
  max-width:90%;
  object-fit:contain;
  display:block;
}
.owner-pill{
  position:absolute; left:10px; bottom:8px;
  font-size:12px; font-weight:900;
  background:rgba(255,255,255,.18);
  color:#fff;
  border-radius:999px;
  padding:4px 10px;
  display:none;
}
body.edit-mode .owner-pill{ display:inline-block; }

.change-logo-btn{
  display:none; position:absolute; right:10px; bottom:6px;
  background:#006600; color:#fff; border:none; border-radius:14px;
  padding:6px 10px; font-weight:bold; cursor:pointer; width:auto;
}
body.edit-mode .change-logo-btn{ display:block; }

/* ===== BUSCADOR ===== */
.search-row{
  display:flex; gap:10px; align-items:center;
  margin:10px 12px 12px;
}
.search-bar{
  background:#f2f2f2;
  border-radius:14px;
  padding:12px 12px;
  display:flex; gap:10px; align-items:center; flex:1;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.8);
}
.search-bar input{
  border:none; background:none; outline:none;
  flex:1; font-size:16px;
}

/* ===== CONTENIDO ===== */
section{ padding:12px; }
.banner img{ width:100%; border-radius:12px; }

/* Cabecera de bloque */
.section-head{
  display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
}
.section-head h2{ margin:10px 0 4px; font-size:22px; }
.subtitle{ font-size:14px; color:#666; margin:0 0 10px; }

/* Botón + (solo modo edición) */
.add-product-btn{
  display:none;
  width:34px; height:34px; border-radius:12px;
  background:#006600; color:#fff; border:none;
  font-weight:900; font-size:20px; line-height:34px;
  text-align:center; cursor:pointer; margin-top:8px; flex:0 0 auto;
}
body.edit-mode .add-product-btn{ display:inline-block; }

/* ===== PRODUCTOS (Carrusel horizontal) ===== */
.carousel{
  display:flex; gap:14px; overflow-x:auto;
  padding-bottom:6px;
  scroll-snap-type: x mandatory;
}
.product{
  min-width:160px;
  background:#fff;
  border-radius:14px;
  padding:10px;
  text-align:left;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
  scroll-snap-align:start;
  position:relative;
}
.product img{
  width:100%;
  border-radius:12px;
  background:#fafafa;
  aspect-ratio: 1 / 1;
  object-fit:contain;
}
.product h3{
  font-size:16px;
  margin:8px 0 4px;
  line-height:1.2;
}
.desc{ font-size:12px; color:#666; margin:0 0 10px; }
.price{
  font-weight:900;
  font-size:18px;
  margin:4px 0 2px;
}
.unit{
  font-size:12px;
  color:#666;
  margin:0 0 4px;
}

/* Herramientas de edición dentro del producto */
.owner-tools{
  display:none;
  gap:8px;
  margin-top:8px;
}
body.edit-mode .owner-tools{ display:flex; }
.owner-tools .tool-btn{
  width:100%;
  border:none;
  border-radius:14px;
  padding:9px 10px;
  background:#f2f2f2;
  font-weight:900;
  font-size:13px;
  cursor:pointer;
}
.owner-tools .tool-btn.green{ background:#006600; color:#fff; }

/* ===== FOOTER / NAV ===== */
footer{
  padding:10px 12px;
  border-top:1px solid #eee;
  display:flex; gap:10px; justify-content:space-between;
}
footer button{
  border:none;
  border-radius:14px;
  padding:10px 12px;
  font-weight:900;
  cursor:pointer;
}
nav{
  position:fixed; bottom:0; width:100%;
  background:#fff;
  display:flex; justify-content:space-around;
  box-shadow:0 -2px 6px rgba(0,0,0,.08);
  padding:10px 0;
}
nav a{
  text-decoration:none;
  color:#777;
  font-size:12px;
  text-align:center;
  cursor:pointer;
  user-select:none;
  flex:1;
}
nav a.active{ color:#006600; font-weight:900; }

/* ===== EDICIÓN ===== */
body.edit-mode{ outline:3px solid #006600; }

/* ===== MODAL BASE ===== */
.modal{
  position:fixed; inset:0; background:rgba(0,0,0,.35);
  display:none; z-index:60000;
  padding:12px; box-sizing:border-box;
}
.modal.open{ display:flex; }
.sheet{
  margin:auto;
  width:100%;
  max-width:520px;
  background:#fff;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  max-height:85vh;
}
.sheet-header{
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 14px;
  border-bottom:1px solid #eee;
}
.sheet-header h3{ margin:0; font-size:18px; }
.sheet-close{
  border:none;
  width:auto;
  background:#f2f2f2;
  border-radius:14px;
  padding:8px 12px;
  font-weight:900;
  cursor:pointer;
}
.sheet-body{ padding:12px 14px; overflow:auto; flex:1; }
.hr{ height:1px; background:#eee; margin:10px 0; }

/* ===== FORMS ===== */
.form{ display:flex; flex-direction:column; gap:12px; }
.field{ display:flex; flex-direction:column; gap:6px; }
label.label{ font-size:13px; color:#666; font-weight:900; }
.input, .select{
  border:1px solid #e6e6e6;
  border-radius:14px;
  padding:12px;
  font-size:16px;
  outline:none;
  background:#fff;
}
.helper{ font-size:12px; color:#666; line-height:1.35; }
.row2{ display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
.actions-row{ display:flex; gap:10px; }
.actions-row button{ border:none; width:100%; padding:12px; font-weight:900; border-radius:16px; cursor:pointer; }
#pmSave{ background:#006600; color:#fff; }
.btn-secondary{ background:#f2f2f2; color:#222; }

/* ===== MODAL CATEGORÍAS ===== */
.cat-list{ display:flex; flex-direction:column; gap:10px; }
.cat-item{
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  padding:12px;
  border:1px solid #eee;
  border-radius:14px;
  background:#fff;
  cursor:pointer;
}
.cat-left{ display:flex; align-items:center; gap:12px; min-width:0; }
.cat-icon{
  width:40px; height:40px; border-radius:14px;
  background:#f2f2f2;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; flex:0 0 auto;
}
.cat-name{ font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cat-arrow{ color:#999; font-weight:900; }

/* ===== PANTALLAS FULLSCREEN ===== */
.fullscreen{
  position:fixed;
  inset:0;
  background:#fff;
  display:none;
  z-index:50000;
}
.fullscreen.open{ display:block; }

.topbar{
  position:sticky;
  top:0;
  z-index:2;
  background:#fff;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
  padding:12px 12px 10px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.topbar-left{
  display:flex; flex-direction:column; gap:2px; min-width:0;
}
.topbar-title{
  font-size:24px;
  font-weight:900;
  margin:0;
  line-height:1.1;
}
.topbar-sub{
  margin:0;
  font-size:14px;
  color:#666;
}
.topbar-actions{
  display:flex; align-items:center; gap:10px;
}
.btn-back{
  border:none;
  width:auto;
  border-radius:14px;
  padding:10px 12px;
  background:#f2f2f2;
  font-weight:900;
  cursor:pointer;
}
.btn-plus{
  display:none;
  width:40px; height:40px;
  border-radius:14px;
  background:#006600;
  color:#fff;
  border:none;
  font-size:22px;
  font-weight:900;
  line-height:40px;
  text-align:center;
  cursor:pointer;
}
body.edit-mode .btn-plus{ display:inline-block; }

.full-content{
  padding:12px;
  padding-bottom:130px;
  height: calc(100vh - 70px);
  overflow:auto;
  box-sizing:border-box;
}

/* ===== Categoría: buscador + grid ===== */
.cat-search{
  display:flex;
  align-items:center;
  gap:10px;
  background:#f2f2f2;
  padding:10px 12px;
  border-radius:14px;
  margin-bottom:12px;
}
.cat-search input{
  border:none; background:none; outline:none;
  font-size:16px; width:100%;
}
.cat-grid{
  display:grid;
  grid-template-columns:repeat(2, minmax(0, 1fr));
  gap:12px;
}

/* ===== Toast ===== */
.toast{
  position:fixed;
  left:12px;
  right:12px;
  bottom:90px;
  background:#111;
  color:#fff;
  padding:12px 14px;
  border-radius:16px;
  box-shadow:0 8px 22px rgba(0,0,0,.25);
  z-index:999999;
  display:none;
  font-weight:900;
}
.toast.show{ display:block; }
</style>
</head>

<script type="module">
/* ==========================================================
   CONFIG LOCAL
   ========================================================== */
const OWNER_PIN_LOCAL = "19872007";
const STORAGE_KEY_UI = "ui_v31_cat";
const STORAGE_KEY_PRODUCTS = "products_v31_cat";

let editMode = false;
let currentCategoryKey = null;

/* Categorías */
const CATEGORIES = [
  { key:"aceite", name:"Aceite", icon:"🫒" },
  { key:"especias", name:"Especias", icon:"🌶️" },
  { key:"salsas", name:"Salsas", icon:"🥫" },
  { key:"bebidas", name:"Bebidas", icon:"🥤" },
  { key:"aperitivos", name:"Aperitivos", icon:"🥨" },
  { key:"arroz_legumbres_pasta", name:"Arroz, legumbres y pasta", icon:"🍝" },
  { key:"dulces_chocolates", name:"Dulces y chocolates", icon:"🍫" },
  { key:"cafe_infusiones", name:"Café e infusiones", icon:"☕" },
  { key:"carne", name:"Carne", icon:"🥩" },
  { key:"congelados", name:"Congelados", icon:"🧊" },
  { key:"frutas_verduras", name:"Frutas y verduras", icon:"🥦" },
  { key:"limpieza_hogar", name:"Limpieza y hogar", icon:"🧼" },
];

/* ==========================================================
   UTILIDADES
   ========================================================== */
const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));

function toast(msg){
  const t = $("#toast");
  t.innerHTML = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 3200);
}

function formatEuro(n){
  const v = (Math.round((Number(n)||0) * 100) / 100).toFixed(2).replace(".", ",");
  return v + " €";
}
function parsePrice(text){
  const cleaned = String(text||"")
    .trim()
    .replace(/\s/g,"")
    .replace("€","")
    .replace(",", ".");
  const n = parseFloat(cleaned);
  return Number.isFinite(n) ? n : 0;
}
function slugify(s){
  return (s||"producto")
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9]+/g,"-")
    .replace(/(^-|-$)/g,"");
}
function uid(){
  return "p_" + Math.random().toString(36).slice(2,8) + "_" + Date.now().toString(36);
}

/* ==========================================================
   UI / MODALES
   ========================================================== */
function openModal(id){
  const m = document.getElementById(id);
  if(!m) return;
  m.classList.add("open");
  m.setAttribute("aria-hidden","false");
  const first = m.querySelector("button, input, select");
  if(first) setTimeout(()=>first.focus(), 0);
}
function closeModal(id){
  const m = document.getElementById(id);
  if(!m) return;
  m.classList.remove("open");
  m.setAttribute("aria-hidden","true");
}
function openFull(id){
  const el = document.getElementById(id);
  if(!el) return;
  el.classList.add("open");
}
function closeFull(id){
  const el = document.getElementById(id);
  if(!el) return;
  el.classList.remove("open");
}
function bindBackdropClose(modalId){
  const m = document.getElementById(modalId);
  if(!m) return;
  m.addEventListener("click", (e)=>{
    if(e.target===m) closeModal(modalId);
  });
}
document.addEventListener("keydown",(e)=>{
  if(e.key !== "Escape") return;
  const m = $(".modal.open");
  if(m){ closeModal(m.id); return; }
  const f = $(".fullscreen.open");
  if(f){ closeFull(f.id); return; }
});

/* ==========================================================
   STORAGE: UI
   ========================================================== */
function defaultUI(){
  return {
    logoSrc: "https://via.placeholder.com/400x120?text=LOGO",
    bannerSrc: "https://via.placeholder.com/700x300?text=Supermercado",
    headings: {
      priceDrops: { title:"Bajadas de precio", subtitle:"Échales un vistazo" },
      novedades:  { title:"Novedades", subtitle:"Recién llegados" },
      bebidas:    { title:"Bebidas", subtitle:"Refrescos, vinos y cervezas" },
    }
  };
}
function loadUI(){
  try{
    const s = localStorage.getItem(STORAGE_KEY_UI);
    if(s) return JSON.parse(s);
  }catch{}
  const d = defaultUI();
  localStorage.setItem(STORAGE_KEY_UI, JSON.stringify(d));
  return d;
}
function saveUI(obj){
  localStorage.setItem(STORAGE_KEY_UI, JSON.stringify(obj));
}
function applyUI(){
  const ui = loadUI();
  $("#topLogo").src = ui.logoSrc;
  $("#homeBanner").src = ui.bannerSrc;

  $("#hPriceDrops").textContent = ui.headings.priceDrops.title;
  $("#sPriceDrops").textContent = ui.headings.priceDrops.subtitle;

  $("#hNovedades").textContent = ui.headings.novedades.title;
  $("#sNovedades").textContent = ui.headings.novedades.subtitle;

  $("#hBebidas").textContent = ui.headings.bebidas.title;
  $("#sBebidas").textContent = ui.headings.bebidas.subtitle;
}

/* ==========================================================
   IMÁGENES: compresión
   ========================================================== */
function compressImageToDataURL(file, maxSize=900, quality=0.82){
  return new Promise((resolve)=>{
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const img = new Image();
      img.onload = ()=>{
        const canvas = document.createElement("canvas");
        let { width:w, height:h } = img;
        const scale = Math.min(1, maxSize / Math.max(w,h));
        w = Math.round(w*scale);
        h = Math.round(h*scale);
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0,0,w,h);
        let out = "";
        try{
          out = canvas.toDataURL("image/webp", quality);
          if(!out.startsWith("data:image/webp")) throw new Error("no webp");
        }catch{
          out = canvas.toDataURL("image/jpeg", quality);
        }
        resolve(out);
      };
      img.onerror = ()=> resolve(ev.target.result);
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ==========================================================
   PRODUCTOS (local)
   ========================================================== */
function defaultProducts(){

    home: {

        { id:"cebollas-0", name:"Cebollas", desc:"Malla 1 kg", price:1.60, unit:"€/ud.", category:"frutas_verduras", img:"https://via.placeholder.com/400?text=Cebollas" },
        { id:"patatas-1", name:"Patatas", desc:"Malla 5 kg", price:5.00, unit:"€/ud.", category:"frutas_verduras", img:"https://via.placeholder.com/400?text=Patatas" },
      ],
      novedades: [
        { id:"shot-0", name:"Shot jengibre", desc:"125 ml", price:2.00, unit:"€/ud.", category:"frutas_verduras", img:"https://via.placeholder.com/400?text=Shot" },
        { id:"tomates-1", name:"Tomates negros", desc:"1 kg aprox.", price:2.60, unit:"€/pack", category:"frutas_verduras", img:"https://via.placeholder.com/400?text=Tomates" },
      ],
      bebidas: [
        { id:"cola-0", name:"Refresco de cola", desc:"Botella 2 L", price:1.80, unit:"€/ud.", category:"bebidas", img:"https://via.placeholder.com/400?text=Refresco" },
        { id:"vino-1", name:"Vino tinto", desc:"Botella 750 ml", price:4.20, unit:"€/ud.", category:"bebidas", img:"https://via.placeholder.com/400?text=Vino" },
      ]
    },
    categories: {}
  };
}
function loadProducts(){
  try{
    const s = localStorage.getItem(STORAGE_KEY_PRODUCTS);
    if(s) return JSON.parse(s);
  }catch{}
  const d = defaultProducts();
  CATEGORIES.forEach(cat=>{
    d.categories[cat.key] = d.categories[cat.key] || [];
  });
  localStorage.setItem(STORAGE_KEY_PRODUCTS, JSON.stringify(d));
  return d;
}
function saveProducts(obj){
  localStorage.setItem(STORAGE_KEY_PRODUCTS, JSON.stringify(obj));
}

/* ==========================================================
   RENDER HOME + CATEGORIES
   ========================================================== */
function productCardHTML(p){
  const safeName = (p.name || "Producto").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const safeDesc = (p.desc || "").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  return `
    <div class="product" data-pid="${p.id}" data-cat="${p.category || ""}">
      <img src="${p.img}" alt="${safeName}" loading="lazy">
      <h3>${safeName}</h3>
      <p class="desc">${safeDesc}</p>
      <p class="price">${formatEuro(p.price)}</p>
      <p class="unit">${p.unit || "€/ud."}</p>
      <div class="owner-tools">
        <button class="tool-btn" data-edit-product="${p.id}" type="button">Editar</button>
        <button class="tool-btn green" data-dup-product="${p.id}" type="button">Duplicar</button>
      </div>
    </div>
  `;
}
function renderHome(){
  const products = loadProducts();
  $("#price-carousel").innerHTML = products.home.priceDrops.map(productCardHTML).join("");
  $("#novedades-carousel").innerHTML = products.home.novedades.map(productCardHTML).join("");
  $("#bebidas-carousel").innerHTML = products.home.bebidas.map(productCardHTML).join("");
}
function renderCategory(catKey){
  const products = loadProducts();
  const items = products.categories[catKey] || [];
  $("#catScreenGrid").innerHTML = items.map(productCardHTML).join("");
}
function renderCategoriesList(){
  const list = $("#catList");
  list.innerHTML = "";
  CATEGORIES.forEach(cat=>{
    const item = document.createElement("div");
    item.className = "cat-item";
    item.innerHTML = `
      <div class="cat-left">
        <div class="cat-icon">${cat.icon}</div>
        <div class="cat-name">${cat.name}</div>
      </div>
      <div class="cat-arrow">›</div>
    `;
    item.addEventListener("click", ()=>{
      closeModal("categoriesModal");
      openCategoryScreen(cat.key);
    });
    list.appendChild(item);
  });
}

/* ==========================================================
   MODO DUEÑO (Control de Layout y catálogo Local)
   ========================================================== */
function toggleOwnerModeLocal(){
  if(editMode){
    editMode=false;
    document.body.classList.remove("edit-mode");
    toast("Modo dueño desactivado");
    return;
  }
  const pin = prompt("PIN de dueño (catálogo local):");
  if(pin === OWNER_PIN_LOCAL){
    editMode=true;
    document.body.classList.add("edit-mode");
    toast("Modo dueño activado 🛠️");
  }else{
    alert("PIN incorrecto.");
  }
}
function resetAll(){
  if(!confirm("¿Seguro que quieres borrar todos los cambios de diseño y volver al estado inicial?")) return;
  localStorage.removeItem(STORAGE_KEY_UI);
  localStorage.removeItem(STORAGE_KEY_PRODUCTS);
  location.reload();
}

/* ==========================================================
   EDITOR PRODUCTOS
   ========================================================== */
const productModalState = { scope:null, pid:null };

function fillCategorySelect(){
  const sel = $("#pmCategory");
  sel.innerHTML = CATEGORIES.map(c=><option value="${c.key}">${c.name}</option>).join("");
}
function openProductEditor(scope, pid){
  if(!editMode) return;
  const products = loadProducts();
  const arr = scope.type === "home" ? (products.home[scope.key]||[]) : (products.categories[scope.key]||[]);
  const p = arr.find(x=>x.id===pid);
  if(!p) return;

  productModalState.scope = scope;
  productModalState.pid = pid;

  $("#productModalTitle").textContent = "Editar producto";
  $("#pmName").value = p.name || "";
  $("#pmDesc").value = p.desc || "";
  $("#pmPrice").value = String(p.price ?? 0).replace(".", ",");
  $("#pmUnit").value = p.unit || "€/ud.";
  $("#pmCategory").value = p.category || "bebidas";
  openModal("productModal");
}
async function changeProductImage(){
  const scope = productModalState.scope;
  const pid = productModalState.pid;
  if(!scope || !pid) return;

  const input = document.createElement("input");
  input.type = "file";
  input.accept = "image/*";
  input.onchange = async (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const data = await compressImageToDataURL(file, 900, 0.82);

    const products = loadProducts();
    const arr = scope.type === "home" ? (products.home[scope.key] || []) : (products.categories[scope.key] || []);
    const p = arr.find(x=>x.id===pid);
    if(!p) return;
    p.img = data;
    saveProducts(products);

    if(scope.type==="home"){ renderHome(); }
    else { renderCategory(scope.key); }
  };
  input.click();
}
function saveProductEditor(){
  const scope = productModalState.scope;
  const pid = productModalState.pid;
  if(!scope || !pid) return;

  const name = $("#pmName").value.trim() || "Producto";
  const desc = $("#pmDesc").value.trim();
  const price = parsePrice($("#pmPrice").value);
  const unit = $("#pmUnit").value;
  const category = $("#pmCategory").value;

  const products = loadProducts();
  const arr = scope.type === "home" ? (products.home[scope.key] || []) : (products.categories[scope.key] || []);
  const p = arr.find(x=>x.id===pid);
  if(!p) return;

  if(!p.id || p.id.startsWith("nuevo-")){
    p.id = slugify(name) + "-" + Math.floor(Math.random()*900+100);
  }

  p.name = name;
  p.desc = desc;
  p.price = price;
  p.unit = unit;
  p.category = category;

  saveProducts(products);

  if(scope.type==="home"){ renderHome(); }
  else { renderCategory(scope.key); }

  closeModal("productModal");
}
function deleteProductEditor(){
  const scope = productModalState.scope;
  const pid = productModalState.pid;
  if(!scope || !pid) return;
  if(!confirm("¿Eliminar este producto del catálogo?")) return;

  const products = loadProducts();
  const arr = scope.type === "home" ? (products.home[scope.key] || []) : (products.categories[scope.key] || []);
  const idx = arr.findIndex(x=>x.id===pid);
  if(idx>=0) arr.splice(idx,1);
  if(scope.type==="home") products.home[scope.key] = arr;
  else products.categories[scope.key] = arr;
  saveProducts(products);

  if(scope.type==="home"){ renderHome(); }
  else { renderCategory(scope.key); }

  closeModal("productModal");
}
function duplicateProduct(scope, pid){
  const products = loadProducts();
  const arr = scope.type === "home" ? (products.home[scope.key] || []) : (products.categories[scope.key] || []);
  const p = arr.find(x=>x.id===pid);
  if(!p) return;

  const copy = { ...p, id: p.id + "-c" + Math.floor(Math.random()*90+10) };
  arr.push(copy);
  if(scope.type==="home") products.home[scope.key] = arr;
  else products.categories[scope.key] = arr;
  saveProducts(products);

  if(scope.type==="home"){ renderHome(); }
  else { renderCategory(scope.key); }
}
function addHomeProduct(sectionKey){
  if(!editMode) return;
  const products = loadProducts();
  const p = {
    id: "nuevo-" + uid(),
    name: "Nuevo producto",
    desc: "Descripción",
    price: 0,
    unit: "€/ud.",
    category: sectionKey === "bebidas" ? "bebidas" : "frutas_verduras",
    img: "https://via.placeholder.com/400?text=Nuevo"
  };
  products.home[sectionKey] = products.home[sectionKey] || [];
  products.home[sectionKey].push(p);
  saveProducts(products);
  renderHome();
  openProductEditor({type:"home", key:sectionKey}, p.id);
}
function addCategoryProduct(catKey){
  if(!editMode || !catKey) return;
  const products = loadProducts();
  products.categories[catKey] = products.categories[catKey] || [];
  const p = {
    id: "nuevo-" + uid(),
    name: "Nuevo producto",
    desc: "Descripción",
    price: 0,
    unit: "€/ud.",
    category: catKey,
    img: "https://via.placeholder.com/400?text=Nuevo"
  };
  products.categories[catKey].push(p);
  saveProducts(products);
  renderCategory(catKey);
  openProductEditor({type:"category", key:catKey}, p.id);
}

/* Modificaciones estéticas de UI */
async function changeLogo(){
  if(!editMode) return;
  const input = document.createElement("input");
  input.type="file";
  input.accept="image/*";
  input.onchange=async (e)=>{
    const file=e.target.files[0];
    if(!file) return;
    const data = await compressImageToDataURL(file, 1000, 0.86);
    const ui = loadUI();
    ui.logoSrc = data;
    saveUI(ui);
    applyUI();
  };
  input.click();
}
async function changeBanner(){
  if(!editMode) return;
  const input = document.createElement("input");
  input.type="file";
  input.accept="image/*";
  input.onchange=async (e)=>{
    const file=e.target.files[0];
    if(!file) return;
    const data = await compressImageToDataURL(file, 1200, 0.82);
    const ui = loadUI();
    ui.bannerSrc = data;
    saveUI(ui);
    applyUI();
  };
  input.click();
}
function editHeading(which){
  if(!editMode) return;
  const ui = loadUI();
  const section = ui.headings[which];
  const title = prompt("Título:", section.title);
  if(title===null) return;
  const sub = prompt("Subtítulo:", section.subtitle);
  if(sub===null) return;
  ui.headings[which] = { title:title.trim(), subtitle:sub.trim() };
  saveUI(ui);
  applyUI();
}

/* ==========================================================
   NAV + SEARCH
   ========================================================== */
function setActiveNav(id){
  ["navHome","navCategories"].forEach(n=>{
    const el=document.getElementById(n);
    if(el) el.classList.toggle("active", n===id);
  });
}
function enableHomeSearch(){
  const input = $("#search");
  input.addEventListener("input", ()=>{
    const q = (input.value||"").toLowerCase().trim();
    $$("#app .product").forEach(card=>{
      const title = ($("h3", card)?.textContent || "").toLowerCase();
      card.style.display = title.includes(q) ? "block" : "none";
    });
  });
}
function enableCategorySearch(){
  const input = $("#catSearchInput");
  input.addEventListener("input", ()=>{
    const q = (input.value||"").toLowerCase().trim();
    $$("#catScreenGrid .product").forEach(card=>{
      const title = ($("h3", card)?.textContent || "").toLowerCase();
      card.style.display = title.includes(q) ? "block" : "none";
    });
  });
}

/* ==========================================================
   PANTALLA CATEGORÍA
   ========================================================== */
function openCategoryScreen(catKey){
  currentCategoryKey = catKey;
  const cat = CATEGORIES.find(c=>c.key===catKey);
  $("#catScreenTitle").textContent = cat ? cat.name : "Categoría";

  const products = loadProducts();
  products.categories[catKey] = products.categories[catKey] || [];
  if(products.categories[catKey].length===0){
    products.categories[catKey] = [0,1,2,3].map(i=>({
      id: ${catKey}-${i+1}-${Math.floor(Math.random()*900+100)},
      name: ${cat?.name || "Producto"} ${i+1},
      desc: "Descripción",
      price: i+1,
      unit: "€/ud.",
      category: catKey,
      img: "https://via.placeholder.com/400?text=Producto"
    }));
    saveProducts(products);
  }

  $("#catSearchInput").value = "";
  renderCategory(catKey);
  openFull("categoryScreen");
}

/* ==========================================================
   EVENTOS
   ========================================================== */
document.addEventListener("click", async (e)=>{
  const t = e.target;

  const closeModalBtn = t.closest("[data-close-modal]");
  if(closeModalBtn){
    closeModal(closeModalBtn.getAttribute("data-close-modal"));
    return;
  }
  const closeFullBtn = t.closest("[data-close-full]");
  if(closeFullBtn){
    closeFull(closeFullBtn.getAttribute("data-close-full"));
    return;
  }

  // NAV BAR
  if(t.closest("#navHome")){
    setActiveNav("navHome");
    closeModal("categoriesModal");
    closeFull("categoryScreen");
    return;
  }
  if(t.closest("#navCategories")){
    setActiveNav("navCategories");
    renderCategoriesList();
    openModal("categoriesModal");
    return;
  }

  // Owner: Editar / Duplicar productos
  const editP = t.closest("[data-edit-product]");
  if(editP){
    const pid = editP.getAttribute("data-edit-product");
    if($("#categoryScreen").classList.contains("open") && currentCategoryKey){
      openProductEditor({type:"category", key:currentCategoryKey}, pid);
    }else{
      const products = loadProducts();
      const scopes = ["priceDrops","novedades","bebidas"];
      const found = scopes.find(k => (products.home[k]||[]).some(x=>x.id===pid));
      if(found) openProductEditor({type:"home", key:found}, pid);
    }
    return;
  }
  const dupP = t.closest("[data-dup-product]");
  if(dupP){
    const pid = dupP.getAttribute("data-dup-product");
    if($("#categoryScreen").classList.contains("open") && currentCategoryKey){
      duplicateProduct({type:"category", key:currentCategoryKey}, pid);
    }else{
      const products = loadProducts();
      const scopes = ["priceDrops","novedades","bebidas"];
      const found = scopes.find(k => (products.home[k]||[]).some(x=>x.id===pid));
      if(found) duplicateProduct({type:"home", key:found}, pid);
    }
    return;
  }

  // Owner: Añadir productos
  const addHomeBtn = t.closest("[data-add-home]");
  if(addHomeBtn){
    addHomeProduct(addHomeBtn.getAttribute("data-add-home"));
    return;
  }
  if(t.closest("#catScreenAddBtn")){
    addCategoryProduct(currentCategoryKey);
    return;
  }
});

/* ==========================================================
   INIT
   ========================================================== */
function init(){
  applyUI();
  fillCategorySelect();
  renderHome();

  bindBackdropClose("categoriesModal");
  bindBackdropClose("productModal");

  $("#changeLogoBtn").addEventListener("click", changeLogo);
  $("#homeBanner").addEventListener("dblclick", ()=>{ if(editMode) changeBanner(); });
  $("#hPriceDrops").addEventListener("dblclick", ()=>editHeading("priceDrops"));
  $("#hNovedades").addEventListener("dblclick", ()=>editHeading("novedades"));
  $("#hBebidas").addEventListener("dblclick", ()=>editHeading("bebidas"));
  $("#sPriceDrops").addEventListener("dblclick", ()=>editHeading("priceDrops"));
  $("#sNovedades").addEventListener("dblclick", ()=>editHeading("novedades"));
  $("#sBebidas").addEventListener("dblclick", ()=>editHeading("bebidas"));

  enableHomeSearch();
  enableCategorySearch();

  // Botones inferiores permanentes
  $("#editBtn").addEventListener("click", toggleOwnerModeLocal);
  $("#resetBtn").addEventListener("click", resetAll);

  // Botones internos del editor de producto
  $("#pmChangeImg").addEventListener("click", changeProductImage);
  $("#pmSave").addEventListener("click", saveProductEditor);
  $("#pmDelete").addEventListener("click", deleteProductEditor);

  setActiveNav("navHome");
  renderCategoriesList();

  toast("Catálogo interactivo listo ✅");
}

init();
</script>
</body>
